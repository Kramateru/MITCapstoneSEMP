version: "1"
services:
  # --- Backend FastAPI API ---
  - type: web
    name: speech-bpo-backend
    runtime: docker
    plan: free
    dockerfilePath: ./dockerfile
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: USE_LOCAL_SQLITE
        value: "0"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: BACKEND_URL
        value: https://speech-bpo-backend.onrender.com
      - key: FRONTEND_URL
        value: https://speech-bpo-frontend.onrender.com
      - key: AZURE_SPEECH_KEY
        sync: false
        optional: true
      - key: AZURE_SPEECH_REGION
        sync: false
        optional: true
      - key: GEMINI_API_KEY
        sync: false
        optional: true
      - key: OPENAI_API_KEY
        sync: false
        optional: true
      - key: ENABLE_LOCAL_TTS
        value: "0"
      - key: ALLOW_LOCAL_MEDIA_FALLBACK
        value: "0"

  # --- Frontend Next.js ---
  - type: web
    name: speech-bpo-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build
    startCommand: bash ./scripts/start-frontend.sh
    envVars:
      - key: NODE_VERSION
        value: 22.0.0
      # Inherit Supabase settings from the backend service so both apps stay on
      # the same project in Render and the assessment module cannot drift.
      - key: NEXT_PUBLIC_SUPABASE_URL
        fromService:
          type: web
          name: speech-bpo-backend
          envVarKey: NEXT_PUBLIC_SUPABASE_URL
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        fromService:
          type: web
          name: speech-bpo-backend
          envVarKey: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        fromService:
          type: web
          name: speech-bpo-backend
          envVarKey: NEXT_PUBLIC_SUPABASE_ANON_KEY
      - key: SUPABASE_URL
        fromService:
          type: web
          name: speech-bpo-backend
          envVarKey: SUPABASE_URL
      - key: SUPABASE_PUBLISHABLE_KEY
        fromService:
          type: web
          name: speech-bpo-backend
          envVarKey: SUPABASE_PUBLISHABLE_KEY
      - key: VITE_SUPABASE_URL
        fromService:
          type: web
          name: speech-bpo-backend
          envVarKey: VITE_SUPABASE_URL
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        fromService:
          type: web
          name: speech-bpo-backend
          envVarKey: VITE_SUPABASE_PUBLISHABLE_KEY
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          type: web
          name: speech-bpo-backend
          envVarKey: BACKEND_URL
      - key: BACKEND_URL
        fromService:
          type: web
          name: speech-bpo-backend
          envVarKey: BACKEND_URL
      - key: SUPABASE_SERVICE_ROLE_KEY
        fromService:
          type: web
          name: speech-bpo-backend
          envVarKey: SUPABASE_SERVICE_ROLE_KEY
      - key: SUPABASE_SERVICE_KEY
        fromService:
          type: web
          name: speech-bpo-backend
          envVarKey: SUPABASE_SERVICE_KEY
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
