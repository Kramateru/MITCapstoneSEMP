version: "1"
services:
  # --- Backend FastAPI API ---
  - type: web
    name: speech-bpo-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: ./scripts/start-backend.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: USE_LOCAL_SQLITE
        value: "0"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: BACKEND_URL
        value: https://speech-bpo-backend.onrender.com
      - key: FRONTEND_URL
        value: https://speech-bpo-frontend.onrender.com
      - key: AZURE_SPEECH_KEY
        sync: false
        optional: true
      - key: AZURE_SPEECH_REGION
        sync: false
        optional: true
      - key: GEMINI_API_KEY
        sync: false
        optional: true
      - key: OPENAI_API_KEY
        sync: false
        optional: true

  # --- Frontend Next.js ---
  - type: web
    name: speech-bpo-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: ./scripts/start-frontend.sh
    envVars:
      - key: NODE_VERSION
        value: 22.0.0
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://speech-bpo-backend.onrender.com
      - key: BACKEND_URL
        value: https://speech-bpo-backend.onrender.com
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
